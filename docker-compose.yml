services:
  auth-users-db:
    image: postgres:17-alpine

    container_name: auth-users-db

    environment:
      POSTGRES_DB: ${USERS_DB_NAME}
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
    
    ports:
      - "5432:5432"
    
    volumes: 
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init:/docker-entrypoint-initdb.d:ro
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USERS_DB_USER:-user} -d ${USERS_DB_NAME:-mydb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    restart: unless-stopped

volumes:
  postgres_data: