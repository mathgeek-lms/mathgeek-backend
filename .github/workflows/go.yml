# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      USERS_DB_NAME: auth-users-database
      USERS_DB_USER: auth-users-username
      USERS_DB_PASSWORD: auth-users-password
      USERS_DB_DSN: host=localhost port=5432 user=auth-users-username password=auth-users-password dbname=auth-users-database sslmode=disable
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Build
      run: go build -v ./...

    - name: Start PostgreSQL
      run: docker compose up -d --wait auth-users-db

    - name: Test
      run: go test -v ./...

    - name: Stop PostgreSQL
      if: always()
      run: docker compose down -v
